<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Böcek'in Paneli 🛠️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent-blue: #00d2ff; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --nav: #151515; --input-bg: rgba(255,255,255,0.1); }
        body.light-mode { --bg: #f0f2f5; --card: #ffffff; --text: #333333; --nav: #ffffff; --input-bg: rgba(0,0,0,0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; overflow-x: hidden; padding-bottom: 120px; width: 100%; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; }
        h1 { font-family: 'Pacifico'; color: var(--accent-blue); margin: 0; font-size: 1.6rem; }
        .theme-toggle { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; color: white; }
        
        .status-card { background: var(--card); border-radius: 20px; padding: 18px; margin: 0 12px 15px 12px; border: 1px solid rgba(128,128,128,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 12px 15px 12px; }
        .mini-card { background: var(--card); border-radius: 18px; padding: 12px; border: 1px solid rgba(128,128,128,0.1); text-align: center; transition: all 0.3s ease; }
        .btn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); border: none; padding: 15px; border-radius: 50px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.95rem; }
        .btn:active { transform: scale(0.98); }
        textarea, input[type="text"], select { width: 100%; padding: 12px; border-radius: 15px; background: var(--input-bg); color: var(--text); border: 1px solid transparent; outline: none; margin-top: 10px; font-family: inherit; font-size: 0.9rem; }
        
        /* TO-DO LIST */
        .todo-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.9rem; transition: 0.3s; }
        .todo-item.done span.todo-text { text-decoration: line-through; opacity: 0.5; }
        .todo-check { width: 22px; height: 22px; border: 2px solid var(--accent-blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .todo-check.checked { background: var(--accent-blue); color: #000; font-weight: bold; }
        .todo-text { flex: 1; }
        .todo-delete { cursor: pointer; opacity: 0.7; font-size: 1.1rem; }

        /* GALERİ VE KLASÖR SİSTEMİ */
        .folder-nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .folder-nav::-webkit-scrollbar { display: none; }
        .folder-chip { background: var(--input-bg); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .folder-chip.active { background: var(--accent-blue); color: #000; font-weight: bold; }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-item-container { position: relative; width: 100%; aspect-ratio: 1; }
        .gallery-item { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); }
        .tag-container { position: absolute; bottom: 5px; left: 5px; right: 5px; display: flex; flex-wrap: wrap; gap: 4px; pointer-events: none; }
        .tag-badge { background: rgba(0,0,0,0.7); color: var(--accent-blue); font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; }
        .photo-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; z-index: 10; }
        .action-btn { background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: var(--nav); display: flex; justify-content: space-between; padding: 15px 15px; z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { cursor: pointer; font-size: 1.3rem; opacity: 0.5; filter: grayscale(1); transition: 0.3s; }
        .nav-item.active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* MULTI FOLDER MODAL */
        #folder-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 99999; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--card); border-radius: 25px; padding: 20px; width: 100%; max-width: 350px; border: 1px solid var(--accent-blue); }
        .folder-option { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .folder-option input { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div id="folder-modal">
        <div class="modal-card">
            <h3 style="margin-top:0;">Klasörleri Seç</h3>
            <div id="modal-folder-list" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn" onclick="savePhotoFolders()">Kaydet ve Kapat</button>
        </div>
    </div>

    <div id="status-popup" style="visibility:hidden; position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--accent-blue); color:#000; padding:10px 20px; border-radius:50px; font-weight:bold; z-index:10001; transition:0.3s;">✅ Başarılı!</div>

    <div id="home" class="page active">
        <div class="header-container"><h1>Böcek OS</h1><button class="theme-toggle" onclick="toggleTheme()">🌓</button></div>
        <div class="grid-container">
            <div class="mini-card" id="coupon-widget" onclick="showPage('coupons', document.querySelector('.nav-item:nth-child(6)'))" style="cursor:pointer; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <small style="opacity:0.7">Durum</small>
                <div id="coupon-display" style="font-weight:bold; margin-top:5px;">Yükleniyor...</div>
            </div>
            <div class="mini-card"><small style="opacity:0.7">Kavuşma</small><div id="countdown" style="color:var(--accent-blue); font-weight: bold;">--:--</div></div>
        </div>
        <div class="status-card" style="text-align:center;">
            <h3 style="font-family:'Pacifico'; font-size:0.9rem; color:var(--accent-blue); margin:0;">Mesafe (GPS)</h3>
            <div id="distance-display" style="font-size:1.3rem; font-weight:bold; margin:8px 0;">Hesaplanıyor...</div>
        </div>
        <div class="status-card">
            <div style="display:flex; justify-content:space-between; align-items:center;"><h3>Mina'nın Modu</h3><span id="mina-mood-display" style="font-size:1.8rem;">⌛</span></div>
            <p id="mina-note" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; border-left:3px solid #ff9a9e; font-style:italic; font-size:0.85rem;">Not bekleniyor...</p>
        </div>
        <div class="grid-container">
            <div class="mini-card">😘 Böcek<div id="kiss-tyler">0</div></div>
            <div class="mini-card">😘 Mina<div id="kiss-mina">0</div></div>
        </div>
        <div style="padding: 0 12px;"><button class="btn" style="background:linear-gradient(135deg, #ff4757, #ff6b81);" onclick="sendMissYou()">MINA'YI ÖZLEDİM ❤️</button></div>
        <div class="status-card" style="margin-top:15px;">
            <h3>Durumunu Güncelle</h3>
            <div id="tyler-mood-selector" style="display:flex; justify-content:center; gap:12px; margin-bottom:15px; flex-wrap: wrap;"></div>
            <textarea id="tylerNote" rows="2" placeholder="Mina'ya mesajın..."></textarea>
            <button class="btn" onclick="updateTylerStatus()">Güncelle & Arşivle</button>
            <div id="archive-list" class="archive-list"></div>
        </div>
    </div>

    <div id="gallery-page" class="page">
        <div class="header-container"><h1>Aşk Galerisi 🖼️</h1></div>
        <div class="status-card">
            <input type="text" id="tag-search" placeholder="🔍 Tag veya Klasör Ara..." oninput="renderGallery()">
            <div style="margin-top:10px;">
                <label style="font-size:0.7rem; opacity:0.7;">Yüklenecek Klasörleri Seç:</label>
                <div id="upload-folder-list" style="max-height: 100px; overflow-y:auto; background:rgba(255,255,255,0.05); border-radius:10px; padding:10px; margin-top:5px;"></div>
                <button class="btn" onclick="addNewFolder()" style="margin-top:5px; padding:8px; font-size:0.7rem;">+ Yeni Klasör</button>
            </div>
            <input type="text" id="photo-tags" placeholder="Etiketler (virgülle ayır)..." style="margin-top:10px;">
            <div class="upload-btn-wrapper" style="margin-top:10px; position:relative; overflow:hidden; display:inline-block; width:100%;">
                <button class="btn">📸 Çoklu Fotoğraf Yükle</button>
                <input type="file" id="photo-upload" accept="image/*" multiple onchange="uploadMultiplePhotos()" style="position:absolute; left:0; top:0; opacity:0; width:100%; height:100%;">
            </div>
            <button class="btn" id="sort-btn" onclick="toggleSort()" style="margin-top:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(0,210,255,0.2);">🔄 Sırala: Yeniler Altta</button>
            <div id="folder-nav" class="folder-nav">
                <div class="folder-chip active" onclick="setGalleryFilter('All')">Hepsi</div>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
        </div>
    </div>

    <!-- IFRAME PAGES -->
    <div id="music-page" class="page">
        <div class="header-container"><h1>Müzik Kutusu 🎵</h1></div>
        <div class="status-card" id="music-display" style="text-align:center; min-height:200px;">Yükleniyor...</div>
        <input type="text" id="music-input" placeholder="YouTube ID">
        <button class="btn" onclick="changeMusic()">Değiştir</button>
    </div>
    <div id="quiz-page" class="page"><iframe src="https://quiz-gamma-lime.vercel.app/" style="width:100%; height:75vh; border:none; border-radius:20px;"></iframe></div>
    <div id="history" class="page"><iframe src="https://time-eight-eta.vercel.app/" style="width:100%; height:75vh; border:none;"></iframe></div>
    <div id="coupons" class="page"><iframe src="https://kupon-coral.vercel.app/" style="width:100%; height:75vh; border:none;"></iframe></div>
    <div id="gift" class="page"><iframe src="https://hediye-alpha.vercel.app/" style="width:100%; height:75vh; border:none;"></iframe></div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)">🏠</div>
        <div class="nav-item" onclick="showPage('music-page', this)">🎵</div>
        <div class="nav-item" onclick="showPage('gallery-page', this)">🖼️</div>
        <div class="nav-item" onclick="showPage('quiz-page', this)">🏆</div>
        <div class="nav-item" onclick="showPage('history', this)">📜</div>
        <div class="nav-item" onclick="showPage('coupons', this)">🎟️</div>
        <div class="nav-item" onclick="showPage('gift', this)">🎁</div>
    </nav>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDzhUgqGWffaHilyO8vFzcIez9HyzMK6r4", 
            authDomain: "tylermina-61718.firebaseapp.com", 
            databaseURL: "https://tylermina-61718-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "tylermina-61718", 
            storageBucket: "tylermina-61718.firebasestorage.app", 
            messagingSenderId: "494227494785", 
            appId: "1:494227494785:web:65cd8a4a50bc0b7531fa80"
        };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }
        function showStatusPopup() {
            const p = document.getElementById('status-popup'); p.style.visibility = 'visible';
            setTimeout(() => p.style.visibility = 'hidden', 2000);
        }

        // --- GALERİ MANTIĞI ---
        let isNewestAtBottom = true;
        let galleryData = [];
        let customFolders = ["Genel"];
        let currentGalleryFilter = 'All';
        let editingPhotoKey = null;

        db.ref('gallery_folders').on('value', snap => {
            customFolders = ["Genel"];
            if(snap.exists()) snap.forEach(c => customFolders.push(c.val()));
            updateFolderUI();
        });

        function updateFolderUI() {
            document.getElementById('upload-folder-list').innerHTML = customFolders.map(f => `
                <div style="font-size:0.8rem; display:inline-block; margin-right:10px;">
                    <input type="checkbox" class="upload-f-check" value="${f}"> ${f}
                </div>
            `).join('');
            let navHtml = `<div class="folder-chip ${currentGalleryFilter === 'All' ? 'active' : ''}" onclick="setGalleryFilter('All')">Hepsi</div>`;
            customFolders.forEach(f => {
                navHtml += `<div class="folder-chip ${currentGalleryFilter === f ? 'active' : ''}" onclick="setGalleryFilter('${f}')">${f}</div>`;
            });
            document.getElementById('folder-nav').innerHTML = navHtml;
        }

        function setGalleryFilter(f) { currentGalleryFilter = f; renderGallery(); }
        function toggleSort() { isNewestAtBottom = !isNewestAtBottom; renderGallery(); }
        function addNewFolder() {
            const n = prompt("Klasör İsmi:");
            if(n && n.trim()) db.ref('gallery_folders').push(n.trim());
        }

        // TAG DÜZENLEME (Tamir edildi)
        function editPhotoTags(key) {
            const photo = galleryData.find(p => p.key === key);
            const currentTags = photo ? photo.tags : [];
            const newTagsStr = prompt("Etiketleri düzenle (virgül ile ayır):", currentTags.join(', '));
            if (newTagsStr !== null) {
                const newTags = newTagsStr.split(',').map(t => t.trim()).filter(t => t !== "");
                db.ref('gallery/' + key).update({ tags: newTags });
                showStatusPopup();
            }
        }

        // KLASÖR MODALI (Tamir edildi)
        function openFolderModal(key) {
            const photo = galleryData.find(p => p.key === key);
            const currentFolders = photo ? photo.folders : ["Genel"];
            editingPhotoKey = key;
            document.getElementById('modal-folder-list').innerHTML = customFolders.map(f => `
                <div class="folder-option">
                    <input type="checkbox" class="modal-f-check" value="${f}" ${currentFolders.includes(f) ? 'checked' : ''}> ${f}
                </div>
            `).join('');
            document.getElementById('folder-modal').style.display = 'flex';
        }

        function savePhotoFolders() {
            const selected = Array.from(document.querySelectorAll('.modal-f-check:checked')).map(el => el.value);
            if(selected.length === 0) selected.push("Genel");
            db.ref('gallery/' + editingPhotoKey).update({ folders: selected });
            document.getElementById('folder-modal').style.display = 'none';
            showStatusPopup();
        }

        function uploadMultiplePhotos() {
            const files = document.getElementById('photo-upload').files;
            const folders = Array.from(document.querySelectorAll('.upload-f-check:checked')).map(el => el.value);
            const tags = document.getElementById('photo-tags').value.split(',').map(t => t.trim()).filter(t => t);
            if(files.length === 0) return;
            if(folders.length === 0) folders.push("Genel");
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX = 1000;
                        canvas.width = MAX; canvas.height = img.height * (MAX / img.width);
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        db.ref('gallery').push({ image: canvas.toDataURL('image/jpeg', 0.8), time: Date.now(), folders: folders, tags: tags });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            document.getElementById('photo-tags').value = ""; showStatusPopup();
        }

        db.ref('gallery').orderByChild('time').on('value', snap => {
            galleryData = [];
            snap.forEach(c => {
                const d = c.val();
                galleryData.push({ key: c.key, ...d, folders: d.folders || ["Genel"], tags: d.tags || [] });
            });
            renderGallery();
        });

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const search = document.getElementById('tag-search').value.toLowerCase();
            let filtered = galleryData.filter(p => {
                const folderMatch = (currentGalleryFilter === 'All' || p.folders.includes(currentGalleryFilter));
                const tagMatch = p.tags.some(t => t.toLowerCase().includes(search)) || p.folders.some(f => f.toLowerCase().includes(search)) || search === "";
                return folderMatch && tagMatch;
            });
            if(!isNewestAtBottom) filtered.reverse();
            document.getElementById('sort-btn').innerText = isNewestAtBottom ? "⬇️ Sırala: Yeniler Altta" : "⬆️ Sırala: Yeniler Üstte";

            grid.innerHTML = filtered.map(p => `
                <div class="gallery-item-container">
                    <div class="photo-actions">
                        <button class="action-btn" onclick="editPhotoTags('${p.key}')">🏷️</button>
                        <button class="action-btn" onclick="openFolderModal('${p.key}')">📂</button>
                        <button class="action-btn" style="color:#ff4757" onclick="if(confirm('Silinsin mi?')) db.ref('gallery/${p.key}').remove()">🗑️</button>
                    </div>
                    <img src="${p.image}" class="gallery-item" onclick="window.open(this.src)">
                    <div class="tag-container">${p.tags.map(t => `<span class="tag-badge">#${t}</span>`).join('')}</div>
                </div>
            `).join('');
        }

        // --- DİĞER FONKSİYONLAR ---
        function toRad(v) { return v * Math.PI / 180; }
        navigator.geolocation.watchPosition((p) => {
            const R = 6371; const dLat = toRad(39.9334 - p.coords.latitude); const dLon = toRad(32.8597 - p.coords.longitude);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(p.coords.latitude)) * Math.cos(toRad(39.9334)) * Math.sin(dLon/2)**2;
            const d = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(3);
            document.getElementById('distance-display').innerText = d.replace('.', ',') + " KM";
        });

        db.ref('active_coupon_Mina').on('value', snap => {
            const val = snap.val(); const widget = document.getElementById('coupon-widget'); const display = document.getElementById('coupon-display');
            if (val && val.status === "Aktif") { display.innerText = "👸 " + val.name; display.style.color = val.rarity === "legendary" ? "gold" : "#ff9a9e"; widget.style.border = val.rarity === "legendary" ? "2px solid gold" : "1px solid #ff9a9e"; } 
            else { display.style.color = "var(--text)"; widget.style.border = "1px solid rgba(128,128,128,0.1)"; if ('getBattery' in navigator) { navigator.getBattery().then(bat => { display.innerText = Math.round(bat.level * 100) + "%"; }); } }
        });

        function updateTylerMood(emoji) { db.ref('status').update({ böcekMood: emoji }); showStatusPopup(); }
        const moods = ['🤍', '😴', '💻', '🍕', '🌹', '🥺', '😤', '😞', '💕', '😍'];
        document.getElementById('tyler-mood-selector').innerHTML = moods.map(m => `<span style="font-size:1.8rem; cursor:pointer;" onclick="updateTylerMood('${m}')">${m}</span>`).join('');

        function updateTylerStatus() {
            const txt = document.getElementById('tylerNote').value; if(!txt.trim()) return;
            db.ref('status').update({ böcekNote: txt });
            db.ref('love_archive').push({ sender: 'Böcek', msg: txt, time: Date.now() });
            document.getElementById('tylerNote').value = ""; showStatusPopup();
        }

        db.ref('love_archive').limitToLast(5).on('value', snap => {
            const l = document.getElementById('archive-list'); l.innerHTML = "";
            snap.forEach(c => { l.innerHTML += `<div class="archive-msg ${c.val().sender==='Böcek'?'msg-me':'msg-other'}">${c.val().msg}</div>`; });
        });

        function changeMusic() { const id = document.getElementById('music-input').value; if(id) db.ref('shared_music').set({ id: id }); }
        db.ref('shared_music').on('value', s => {
            const id = s.val()?.id || "qMsEVXrfuvA";
            document.getElementById('music-display').innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}?rel=0" frameborder="0"></iframe>`;
        });

        function sendMissYou() { db.ref('alerts/minaAlert').set({ msg: "Özledim!", time: Date.now() }); db.ref('kisses/Tyler').transaction(c => (c || 0) + 1); showStatusPopup(); }
        db.ref('status').on('value', s => { const d = s.val(); if(d) { document.getElementById('mina-mood-display').innerText = d.meinMood||"⌛"; document.getElementById('mina-note').innerText = d.meinNote||"Not bekleniyor..."; } });
        db.ref('kisses').on('value', s => { const d = s.val() || {}; document.getElementById('kiss-tyler').innerText = d.Tyler || 0; document.getElementById('kiss-mina').innerText = d.Mina || 0; });
        
        setInterval(() => { 
            const d = new Date("2026-08-01T19:00:00") - new Date(); 
            document.getElementById('countdown').innerText = d > 0 ? Math.floor(d/(1000*60*60*24)) + "g " + Math.floor((d%(1000*60*60*24))/(1000*60*60)) + "s" : "KAVUŞTUK! ❤️"; 
        }, 1000);
    </script>
</body>
</html>
