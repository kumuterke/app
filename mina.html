<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peng App - Mina Panel</title>
    
    <!-- Firebase SDKs (Önce bunlar yüklenmeli) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a12;
            --card-bg: rgba(20, 20, 35, 0.8);
            --accent-pink: #ff007f;
            --accent-neon: #00ffcc;
            --text-main: #ffffff;
            --text-muted: #8a8ab0;
            --border: 1px solid rgba(0, 255, 204, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .light-mode {
            --bg-color: #f7f9fc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1a1a2e;
            --text-muted: #64748b;
            --border: 1px solid rgba(255, 0, 127, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-color); color: var(--text-main); transition: 0.3s; padding-bottom: 100px; }
        
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Pacifico'; background: linear-gradient(45deg, var(--accent-pink), var(--accent-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 1.8rem; }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 0 15px; }
        
        /* Kart Tasarımları */
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: var(--border); backdrop-filter: blur(10px); box-shadow: var(--shadow); margin-bottom: 15px; position: relative; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .mini-card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: var(--border); text-align: center; }

        /* Butonlar */
        .btn-main { background: linear-gradient(45deg, var(--accent-pink), #ff5e62); border: none; border-radius: 18px; padding: 18px; color: white; font-weight: 600; width: 100%; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3); }
        .btn-main:active { transform: scale(0.97); }

        /* Galeri ve To-Do */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .gallery-item { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 15px; border: 2px solid var(--border-color); }
        .todo-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: var(--card-bg); display: flex; justify-content: space-around; padding: 15px; backdrop-filter: blur(15px); border-top: var(--border); border-radius: 25px 25px 0 0; z-index: 1000; }
        .nav-item { font-size: 1.4rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent-pink); transform: scale(1.2); }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        iframe { width: 100%; height: 75vh; border: none; border-radius: 20px; background: white; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="container">
        <h1>Peng App ❤️</h1>
        <div onclick="document.body.classList.toggle('light-mode')" style="cursor:pointer; font-size:1.3rem;">🌓</div>
    </header>

    <div class="container">
        <!-- ANA SAYFA -->
        <div id="home" class="page active">
            <div class="grid-2">
                <div class="mini-card">
                    <small style="color:var(--text-muted)">Böcek Batarya</small>
                    <div id="bat-val" style="font-size:1.4rem; font-weight:bold; color:var(--accent-neon); margin-top:5px;">%--</div>
                </div>
                <div class="mini-card">
                    <small style="color:var(--text-muted)">Kavuşma</small>
                    <div id="countdown" style="font-size:1.1rem; font-weight:bold; color:var(--accent-pink); margin-top:5px;">--g --s</div>
                </div>
            </div>

            <div class="card" style="text-align:center;">
                <small style="color:var(--accent-neon); letter-spacing:1px;">MESAFE (GPS)</small>
                <div id="distance-display" style="font-size:1.6rem; font-weight:800; margin:10px 0;">Hesaplanıyor...</div>
                <div style="display:flex; justify-content:center; gap:20px; font-size:0.8rem; opacity:0.7;">
                    <span>🇹🇷 <span id="local-time">--:--</span></span>
                    <span>🇩🇪 <span id="tyler-time">--:--</span></span>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600;">Böcek'in Modu</span>
                    <span id="tyler-mood" style="font-size:1.8rem;">⌛</span>
                </div>
                <p id="tyler-note" style="font-style:italic; font-size:0.9rem; margin-top:10px; color:var(--text-muted);">"Mesaj bekleniyor..."</p>
            </div>

            <button class="btn-main" onclick="sendMissYou()">BÖCEK'İ ÇOK ÖZLEDİM ❤️</button>

            <!-- Günün Sorusu -->
            <div class="card" style="margin-top:15px; border-color:var(--accent-neon); cursor:pointer;" onclick="newQuestion()">
                <small style="color:var(--accent-neon)">Günün Sorusu</small>
                <div id="daily-q" style="margin-top:8px; font-weight:500;">Böcek'i bugün ne kadar özledin?</div>
            </div>
        </div>

        <!-- GALERİ (Orijinal Motor) -->
        <div id="gallery" class="page">
            <div class="card">
                <h3 style="margin-top:0;">Aşk Galerisi 🖼️</h3>
                <input type="file" id="photo-upload" multiple style="display:none;" onchange="uploadMultiplePhotos()">
                <button class="btn-main" onclick="document.getElementById('photo-upload').click()" style="padding:12px; font-size:0.9rem;">Fotoğraf Yükle</button>
                <div id="gallery-grid" class="gallery-grid"></div>
            </div>
        </div>

        <!-- DİĞER ÖZELLİKLER (IFRAMELER) -->
        <div id="quiz" class="page"><iframe data-src="https://quiz-gamma-lime.vercel.app/"></iframe></div>
        <div id="history" class="page"><iframe data-src="https://time-eight-eta.vercel.app/"></iframe></div>
        <div id="coupons" class="page"><iframe data-src="https://kupon-coral.vercel.app/"></iframe></div>
        <div id="gift" class="page"><iframe data-src="https://hediye-alpha.vercel.app/"></iframe></div>
    </div>

    <!-- ALT NAV -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)">🏠</div>
        <div class="nav-item" onclick="showPage('gallery', this)">🖼️</div>
        <div class="nav-item" onclick="showPage('quiz', this)">🏆</div>
        <div class="nav-item" onclick="showPage('history', this)">📜</div>
        <div class="nav-item" onclick="showPage('coupons', this)">🎟️</div>
        <div class="nav-item" onclick="showPage('gift', this)">🎁</div>
    </nav>

    <script>
        // 1. FIREBASE & SUPABASE BAĞLANTISI
        const config = { apiKey: "AIzaSyDzhUgqGWffaHilyO8vFzcIez9HyzMK6r4", authDomain: "tylermina-61718.firebaseapp.com", databaseURL: "https://tylermina-61718-default-rtdb.europe-west1.firebasedatabase.app", projectId: "tylermina-61718", storageBucket: "tylermina-61718.firebasestorage.app", messagingSenderId: "494227494785", appId: "1:494227494785:web:65cd8a4a50bc0b7531fa80" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();
        const sb = supabase.createClient("https://oiomboymswjulzgpyamj.supabase.co", "sb_publishable_2c7DDrRIVGRiCzFncTsI8w_LpT2Z2-j");

        // 2. SAYFA GEZİNTİSİ
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activePage = document.getElementById(id);
            activePage.classList.add('active'); el.classList.add('active');
            const iframe = activePage.querySelector('iframe');
            if (iframe && !iframe.src) iframe.src = iframe.getAttribute('data-src');
        }

        // 3. CANLI VERİ DİNLEME (Takılma Sorunu Çözümü)
        db.ref('status').on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('bat-val').innerText = "%" + (d.böcekBattery || "--");
            document.getElementById('tyler-mood').innerText = d.böcekMood || "😊";
            document.getElementById('tyler-note').innerText = `"${d.böcekNote || 'Not yok...'}"`;
        });

        // 4. MESAFE & ZAMAN
        function toRad(v) { return v * Math.PI / 180; }
        navigator.geolocation.watchPosition(p => {
            const R = 6371; const dLat = toRad(39.9334 - p.coords.latitude); const dLon = toRad(32.8597 - p.coords.longitude);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(p.coords.latitude)) * Math.cos(toRad(39.9334)) * Math.sin(dLon/2)**2;
            document.getElementById('distance-display').innerText = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2) + " KM";
        });

        // 5. ÖZLEDİM SİNYALİ (Realtime)
        async function sendMissYou() {
            db.ref('alerts/tylerAlert').set({ msg: "Özledim!", time: Date.now() });
            await sb.channel('love').send({ type: 'broadcast', event: 'kiss', payload: { from: 'Mina' } });
            alert("Sinyal Böcek'e uçtu! ❤️");
        }

        // 6. GALERİ MOTORU
        db.ref('gallery').limitToLast(10).on('value', snap => {
            const grid = document.getElementById('gallery-grid'); if(!grid) return;
            grid.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                grid.innerHTML += `<img src="${d.image}" class="gallery-item" onclick="window.open(this.src)">`;
            });
        });

        function uploadMultiplePhotos() {
            const files = document.getElementById('photo-upload').files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => db.ref('gallery').push({ image: e.target.result, time: Date.now() });
                reader.readAsDataURL(file);
            });
        }

        // Saat & Geri Sayım
        setInterval(() => {
            const now = new Date();
            document.getElementById('local-time').innerText = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('tyler-time').innerText = new Date(now.getTime()-(2*60*60*1000)).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            const diff = new Date("2026-08-01T00:00:00") - now;
            document.getElementById('countdown').innerText = Math.floor(diff/(1000*60*60*24)) + "g " + Math.floor((diff%(1000*60*60*24))/(1000*60*60)) + "s";
        }, 1000);
    </script>
</body>
</html>
